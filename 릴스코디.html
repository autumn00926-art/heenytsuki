<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>릴스코디</title>
    <meta property="og:image" content="images/logo.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <script src="https://kit.fontawesome.com/e81da6d86a.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="header-include"></div>

    <section id="reels-products" style="padding: 150px 5% 80px;">
        <h2 style="text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 40px;">릴스코디</h2>
        <ul class="product-list">
            <li>
                <a href="top1.html">
                    <div class="product-image">
                        <img src="images/인기-상의1.jpg" alt="상품 이미지">
                    </div>
                    <div class="product-info">
                        <p class="name">비비 힙걸 나그랑 원숄더티</p>
                        <p class="price">₩25,000</p>
                    </div>
                </a>
            </li>
            <li>
                <a href="top2.html">
                    <div class="product-image">
                        <img src="images/인기-상의2.jpg" alt="상품 이미지">
                    </div>
                    <div class="product-info">
                        <p class="name">비브 청순힙 유넥 레이어드 홀터넥 카라티</p>
                        <p class="price">₩52,000</p>
                    </div>
                </a>
            </li>
            <li>
                <a href="outer1.html">
                    <div class="product-image">
                        <img src="images/인기-아우터1.jpg" alt="상품 이미지">

                        <p class="price">₩53,000</p>
                    </div>
                </a>
            </li>
            <li>
                <a href="bottom2.html">
                    <div class="product-image">
                        <img src="images/인기-바지2.jpg" alt="상품 이미지">

                    <div class="product-info">

                        <p class="price">₩64,000</p>
                    </div>
                </a>
            </li>
            <li>
                <a href="bag1.html">
                    <div class="product-image">
                        <img src="images/bag1.jpg" alt="상품 이미지" style="object-fit: cover;">
                    </div>
                    <div class="product-info">
                        <p class="name">키치 미니 포켓 백팩</p>

                    </div>
                </a>
            </li>
            <li>
                <a href="ACC목도리.html">
                    <div class="product-image">
                        <img src="images/목도리.jpg" alt="상품 이미지" style="object-fit: cover;">
                    </div>
                    <div class="product-info">
                        <p class="name">아쿠 폭닥 파스텔 머플러</p>
                        <p class="price">₩21,000</p>
                    </div>
                </a>
            </li>

    <div id="footer-include"></div>
    <script src="js/main.js"></script>

</html>
