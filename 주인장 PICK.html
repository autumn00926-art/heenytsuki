<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주인장 pick</title>
    <meta property="og:image" content="images/logo.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <script src="https://kit.fontawesome.com/e81da6d86a.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="header-include"></div>

    <section id="pick-products" style="padding: 150px 5% 80px;">
        <h2 style="text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 40px;">주인장 PICK</h2>
        <ul class="product-list">
            <li>
                <a href="top2.html">
                    <div class="product-image">
                        <img src="images/인기-상의2.jpg" alt="상품 이미지">
                    </div>
                    <div class="product-info">
                        <p class="name">비브 청순힙 유넥 레이어드 홀터넥 카라티</p>
                        <p class="price">₩52,000</p>
                    </div>
                </a>
            </li>
            <li>
                <a href="bottom2.html">
                    <div class="product-image">
                        <img src="images/인기-바지2.jpg" alt="상품 이미지">
                    </div>
                    <div class="product-info">
                        <p class="name">남녀공용 렌 빈티지 디테일 카고 팬츠</p>
                        <p class="price">₩64,000</p>
                    </div>
                </a>
            </li>
            <li>
                <a href="bag1.html">
                    <div class="product-image">
                        <img src="images/bag1.jpg" alt="상품 이미지" style="object-fit: cover;">
                    </div>
                    <div class="product-info">
                        <p class="name">키치 미니 포켓 백팩</p>
                        <p class="price">₩28,000</p>
                    </div>
                </a>
            </li>
        </ul>
    </section>

    <div id="footer-include"></div>
    <script src="js/main.js"></script>
</body>

</html>
