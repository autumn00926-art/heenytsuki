<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heenytsuki - 회원가입</title>
    <meta property="og:image" content="images/logo.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <script src="https://kit.fontawesome.com/e81da6d86a.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="header-include"></div>

    <section id="signup-page">
        <h2>JOIN</h2>
        <form class="signup-form">
            <input type="text" placeholder="아이디 (영문, 숫자 6-12자)" required>
            <input type="password" placeholder="비밀번호 (영문, 숫자, 특수문자 조합 8-16자)" required>
            <input type="password" placeholder="비밀번호 확인" required>
            <input type="text" placeholder="이름" required>
            <input type="email" placeholder="이메일" required>
            <input type="tel" placeholder="휴대폰 번호 ('-' 제외)" required>
            <button type="submit" class="signup-btn">가입하기</button>
        </form>
    </section>

    <div id="footer-include"></div>
    <script src="js/main.js"></script>
</body>

</html>
